<main class="shell">
  <section class="card intro">
    <h1>Poker Planner</h1>
    <p>Cree un salon puis partage le lien de la room a ton equipe.</p>

    <div class="form-grid">
      <label>
        Ton nom
        <input type="text" [(ngModel)]="userName" placeholder="Ex: Alex" />
      </label>

      <button type="button" class="btn primary" (click)="createRoom()" [disabled]="loading()">
        Creer un salon
      </button>
    </div>

    @if (error()) {
    <p class="error">{{ error() }}</p>
    }
  </section>
</main>
